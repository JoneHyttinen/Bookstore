<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Bookstore</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" />
  </head>
  <body class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="mb-0">Welcome to the bookstore!</h1>
      <p class="mb-0">Signed in as: <strong th:text="${user}"></strong></p>
      <form th:action="@{/logout}" method="post" class="mb-0">
        <button type="submit" class="btn btn-outline-secondary">
          Sign Out
        </button>
      </form>
    </div>
    <h3>Our books</h3>
    <table class="table table-striped">
      <tr>
        <th>Author</th>
        <th>Title</th>
        <th>Category</th>
        <th>ISBN</th>
        <th>Year</th>
        <th>Price</th>
        <th>Actions</th>
      </tr>
      <tr th:each="book : ${books}">
        <td th:text="${book.author}"></td>
        <td th:text="${book.title}"></td>
        <td th:text="${book.category}?${book.category.name}:''"></td>
        <td th:text="${book.isbn}"></td>
        <td th:text="${book.publishedYear}"></td>
        <td th:text="${book.price}"></td>
        <td>
          <a th:href="@{/edit/{id}(id=${book.id})}" class="btn btn-info"
            >Edit</a
          >
          <a
            th:if="${isAdmin}"
            th:href="@{/delete/{id}(id=${book.id})}"
            class="btn btn-danger"
            >Delete</a
          >
        </td>
      </tr>
    </table>
    <a href="/add" class="btn btn-success">Add Book</a>
    <a href="/categorylist" class="btn btn-secondary">Categories</a>
  </body>
</html>
